<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACT Aptitude MCQ Test</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.timer{
    background:#dc2626;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
}

.progress{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#2563eb;
    transition:0.3s;
}

.question-box{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.question{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
    color:#111827;
}

.option{
    display:block;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    transition:0.3s;
    background:white;
}

.option:hover{
    background:#dbeafe;
}

input[type="radio"]{
    margin-right:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
}

button:hover{
    background:#1d4ed8;
}

.result-section{
    display:none;
    text-align:center;
}

.score{
    font-size:60px;
    color:#16a34a;
    font-weight:bold;
    margin:20px 0;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

.review{
    text-align:left;
    margin-top:25px;
}

.review-item{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

@media(max-width:600px){

    .question{
        font-size:16px;
    }

    .score{
        font-size:42px;
    }

}

</style>
</head>

<body>

<div class="container">

<div id="examSection">

<h1>FACT Aptitude Practice Test</h1>

<p class="subtitle">
Percentage • Ratio • Time & Distance • Work & Time • Series
</p>

<div class="topbar">
<div><strong>Total Questions:</strong> <span id="totalQuestions"></span></div>
<div class="timer">Time Left: <span id="timer">30:00</span></div>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="quizForm"></form>

<button onclick="submitQuiz()">Submit Test</button>

</div>

<div class="result-section" id="resultSection">

<h1>Exam Result</h1>

<div class="score" id="scoreText">0/0</div>

<div id="resultDetails"></div>

<button onclick="showReview()">View Wrong Answers</button>

<button onclick="restartQuiz()">Restart Test</button>

<div class="review" id="reviewBox"></div>

</div>

</div>

<script>

const questions = [

{
question:"A number is increased by 20% and then decreased by 20%. What is the net change?",
options:["No change","4% decrease","4% increase","2% decrease"],
answer:1
},

{
question:"If 45% of a number is 90, the number is:",
options:["150","180","200","220"],
answer:2
},

{
question:"The population of a town increases by 10% every year. If present population is 48,400, what was it 2 years ago?",
options:["40,000","42,000","44,000","46,000"],
answer:0
},

{
question:"A student scored 360 marks out of 450. Find percentage.",
options:["75%","80%","85%","90%"],
answer:1
},

{
question:"The price of sugar rises by 25%. By what percent should consumption reduce so expenditure remains same?",
options:["15%","20%","25%","30%"],
answer:1
},

{
question:"The ratio of boys to girls in a class is 7:5. If total students are 48, number of girls is:",
options:["18","20","22","24"],
answer:1
},

{
question:"If A:B = 3:4 and B:C = 5:6, then A:B:C equals:",
options:["15:20:24","12:15:18","10:12:15","9:12:16"],
answer:0
},

{
question:"Divide ₹840 among A, B, and C in ratio 2:3:7.",
options:["120,180,540","140,210,490","160,240,440","180,240,420"],
answer:1
},

{
question:"If x:y = 4:7 and y:z = 14:9, then x:z =",
options:["8:9","4:9","6:7","8:7"],
answer:0
},

{
question:"Two numbers are in ratio 5:8. If their difference is 24, larger number is:",
options:["40","56","64","72"],
answer:2
},

{
question:"A car travels 240 km in 4 hours. Its speed is:",
options:["40 km/h","50 km/h","60 km/h","80 km/h"],
answer:2
},

{
question:"A train running at 72 km/h crosses a pole in 20 seconds. Length of train is:",
options:["200 m","300 m","400 m","500 m"],
answer:2
},

{
question:"A man walks at 5 km/h. How much distance will he cover in 48 minutes?",
options:["3 km","4 km","5 km","6 km"],
answer:1
},

{
question:"Two trains move in opposite directions at 45 km/h and 55 km/h. Relative speed is:",
options:["10 km/h","45 km/h","55 km/h","100 km/h"],
answer:3
},

{
question:"A bike covers first half distance at 40 km/h and second half at 60 km/h. Average speed is:",
options:["48 km/h","50 km/h","52 km/h","55 km/h"],
answer:0
},

{
question:"A can complete a work in 12 days. B can complete it in 18 days. Together they finish in:",
options:["6.2 days","7.2 days","8 days","9 days"],
answer:1
},

{
question:"If 8 workers complete a work in 15 days, how many days will 12 workers take?",
options:["8","10","12","15"],
answer:1
},

{
question:"A alone can do a work in 20 days. After 5 days B joins and remaining work finishes in 5 more days. B alone can do work in:",
options:["10 days","15 days","20 days","25 days"],
answer:0
},

{
question:"If 6 men or 8 women can complete a work in 12 days, ratio of efficiency of man to woman is:",
options:["3:4","4:3","2:3","1:2"],
answer:1
},

{
question:"A pipe fills a tank in 6 hours and another empties it in 8 hours. Tank fills in:",
options:["12 hours","18 hours","24 hours","30 hours"],
answer:2
},

{
question:"2, 6, 12, 20, 30, ?",
options:["36","40","42","44"],
answer:2
},

{
question:"5, 11, 23, 47, ?",
options:["91","95","99","101"],
answer:1
},

{
question:"3, 9, 27, 81, ?",
options:["162","243","324","729"],
answer:1
},

{
question:"1, 4, 9, 16, 25, ?",
options:["30","35","36","49"],
answer:2
},

{
question:"7, 14, 28, 56, ?",
options:["84","96","112","124"],
answer:2
},

{
question:"A, C, F, J, O, ?",
options:["T","U","V","W"],
answer:1
},

{
question:"Z, X, U, Q, ?",
options:["M","N","O","P"],
answer:1
},

{
question:"B, E, H, K, ?",
options:["L","M","N","O"],
answer:2
},

{
question:"AZ, BY, CX, ?",
options:["DU","DW","EV","EW"],
answer:3
},

{
question:"AB, DE, GH, JK, ?",
options:["LM","MN","NO","OP"],
answer:1
},

{
question:"If the income of A is 25% more than B, then B’s income is how much less than A’s?",
options:["20%","22%","25%","30%"],
answer:0
},

{
question:"A train 240 m long crosses another train 360 m long moving in opposite direction in 12 seconds. If their speeds differ by 10 m/s, faster train speed is:",
options:["20 m/s","25 m/s","30 m/s","35 m/s"],
answer:2
},

{
question:"A can do a work in 15 days and B in 20 days. They work together for 5 days. Remaining work is completed by C in 4 days. C alone can do work in:",
options:["10 days","12 days","15 days","18 days"],
answer:1
},

{
question:"Find missing number: 8, 27, 64, 125, ?",
options:["196","216","225","343"],
answer:1
},

{
question:"ACE, BDF, CEG, ?",
options:["DFH","EGI","DFG","FGH"],
answer:0
}

];

const quizForm = document.getElementById("quizForm");
document.getElementById("totalQuestions").innerText = questions.length;

function loadQuestions(){

quizForm.innerHTML = "";

questions.forEach((q,index)=>{

quizForm.innerHTML += `

<div class="question-box">

<div class="question">
Q${index+1}. ${q.question}
</div>

${q.options.map((option,i)=>`

<label class="option">

<input type="radio"
name="question${index}"
value="${i}"
onchange="updateProgress()">

${option}

</label>

`).join("")}

</div>

`;

});

}

let wrongAnswers = [];

function submitQuiz(){

let score = 0;
wrongAnswers = [];

questions.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="question${index}"]:checked`);

if(selected && parseInt(selected.value) === q.answer){

score++;

}else{

wrongAnswers.push({

question:q.question,
selected:selected ? q.options[selected.value] : "Not Answered",
correct:q.options[q.answer]

});

}

});

document.getElementById("examSection").style.display = "none";
document.getElementById("resultSection").style.display = "block";

document.getElementById("scoreText").innerText =
`${score}/${questions.length}`;

const percentage =
((score/questions.length)*100).toFixed(2);

document.getElementById("resultDetails").innerHTML = `

<h2>
Correct Answers:
<span class="correct">${score}</span>
</h2>

<br>

<h2>
Wrong Answers:
<span class="wrong">${questions.length-score}</span>
</h2>

<br>

<h2>
Percentage: ${percentage}%
</h2>

`;

clearInterval(timerInterval);

}

function showReview(){

const reviewBox =
document.getElementById("reviewBox");

if(wrongAnswers.length === 0){

reviewBox.innerHTML = `
<h2 style="color:green;">
Excellent! All answers correct.
</h2>
`;

return;

}

reviewBox.innerHTML =
"<h2 style='margin-bottom:20px;'>Wrong Answers Review</h2>";

wrongAnswers.forEach((item,index)=>{

reviewBox.innerHTML += `

<div class="review-item">

<strong>
Q${index+1}. ${item.question}
</strong>

<br><br>

<span class="wrong">
Your Answer: ${item.selected}
</span>

<br><br>

<span class="correct">
Correct Answer: ${item.correct}
</span>

</div>

`;

});

}

function restartQuiz(){

document.getElementById("resultSection").style.display = "none";
document.getElementById("examSection").style.display = "block";

timeLeft = 1800;

loadQuestions();

startTimer();

updateProgress();

}

function updateProgress(){

const answered =
document.querySelectorAll("input[type='radio']:checked").length;

const percent =
(answered/questions.length)*100;

document.getElementById("progressBar").style.width =
percent + "%";

}

let timeLeft = 1800;
let timerInterval;

function startTimer(){

clearInterval(timerInterval);

timerInterval = setInterval(()=>{

let minutes = Math.floor(timeLeft/60);

let seconds = timeLeft % 60;

seconds = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("timer").innerText =
`${minutes}:${seconds}`;

if(timeLeft <= 0){

clearInterval(timerInterval);

submitQuiz();

}

timeLeft--;

},1000);

}

loadQuestions();
startTimer();

</script>

</body>
</html>
