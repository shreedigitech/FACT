<head>
  <meta charset="UTF-8" />

  <title>MCQ Online Exam</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #1e3a8a;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }

    .question-box {
      margin-bottom: 25px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 14px;
      background: #f9fafb;
    }

    .question {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #111827;
    }

    .option {
      display: block;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 10px;
      background: white;
      border: 1px solid #d1d5db;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #e0e7ff;
    }

    input[type="radio"] {
      margin-right: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result-box {
      text-align: center;
      display: none;
    }

    .score {
      font-size: 48px;
      color: #16a34a;
      margin: 20px 0;
      font-weight: bold;
    }

    .details {
      font-size: 18px;
      color: #444;
      margin-bottom: 20px;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .question {
        font-size: 16px;
      }
    }
  </style></head>

    const examForm = document.getElementById('examForm');

    function loadQuestions() {
      examForm.innerHTML = '';

      questions.forEach((q, index) => {
        const questionHTML = `
          <div class="question-box">
            <div class="question">
              Q${index + 1}. ${q.question}
            </div>

            ${q.options.map((option, i) => `
              <label class="option">
                <input type="radio" name="question${index}" value="${i}">
                ${option}
              </label>
            `).join('')}
          </div>
        `;

        examForm.innerHTML += questionHTML;
      });
    }

    let wrongAnswers = [];

    function submitExam() {
      let score = 0;
      wrongAnswers = [];

      questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="question${index}"]:checked`);

        if (selected && parseInt(selected.value) === q.answer) {
          score++;
        } else {
          wrongAnswers.push({
            question: q.question,
            correct: q.options[q.answer],
            selected: selected ? q.options[parseInt(selected.value)] : 'Not Answered'
          });
        }
      });

      document.getElementById('examSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';

      document.getElementById('scoreText').innerText = `${score} / ${questions.length}`;

      const percentage = ((score / questions.length) * 100).toFixed(2);

      document.getElementById('detailsText').innerHTML = `
        Correct Answers: <span class="correct">${score}</span><br><br>
        Wrong Answers: <span class="wrong">${questions.length - score}</span><br><br>
        Percentage: <strong>${percentage}%</strong>
      `;
    }

    function showWrongAnswers() {
      const section = document.getElementById('wrongAnswersSection');

      if (wrongAnswers.length === 0) {
        section.innerHTML = '<h2 style="color:green;">Excellent! No wrong answers.</h2>';
      } else {
        section.innerHTML = '<h2 style="margin-bottom:15px;">Wrong Answers Review</h2>';

        wrongAnswers.forEach((item, index) => {
          section.innerHTML += `
            <div style="background:#f9fafb; border:1px solid #ddd; border-radius:12px; padding:15px; margin-bottom:15px;">
              <strong>Q${index + 1}: ${item.question}</strong><br><br>
              <span style="color:red;"><strong>Your Answer:</strong> ${item.selected}</span><br><br>
              <span style="color:green;"><strong>Correct Answer:</strong> ${item.correct}</span>
            </div>
          `;
        });
      }

      section.style.display = 'block';
    }

    function restartExam() {
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('examSection').style.display = 'block';
      loadQuestions();
    }
