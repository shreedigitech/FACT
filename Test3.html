.question{

input[type="radio"]{

button{

}

.result-section{

.score{

.correct{

.wrong{

.review{

}

.review-item{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

@media(max-width:600px){

.question{
    font-size:16px;
}

.score{
    font-size:40px;

const form = document.getElementById("quizForm");

function loadQuestions(){

form.innerHTML = "";

questions.forEach((q,index)=>{

form.innerHTML += `

<div class="question-box">

<div class="question">
Q${index+1}. ${q.question}
</div>

${q.options.map((option,i)=>`

<label class="option">

<input type="radio"
name="q${index}"
value="${i}"
onchange="updateProgress()">

${option}

</label>

`).join("")}

</div>

`;

});

}

let wrongAnswers = [];

function submitQuiz(){

let score = 0;
wrongAnswers = [];

questions.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="q${index}"]:checked`);

if(selected && parseInt(selected.value) === q.answer){

score++;

}else{

wrongAnswers.push({
question:q.question,
selected:selected ? q.options[selected.value] : "Not Answered",
correct:q.options[q.answer]
});

}

});

document.getElementById("examSection").style.display = "none";
document.getElementById("resultSection").style.display = "block";

document.getElementById("scoreText").innerText =
`${score}/${questions.length}`;

const percentage =
((score/questions.length)*100).toFixed(2);

document.getElementById("resultDetails").innerHTML = `

<h2>
Correct:
<span class="correct">${score}</span>
</h2>

<br>

<h2>
Wrong:
<span class="wrong">${questions.length-score}</span>
</h2>

<br>

<h2>
Percentage: ${percentage}%
</h2>

`;

clearInterval(timerInterval);

}

function showReview(){

const reviewBox =
document.getElementById("reviewBox");

if(wrongAnswers.length===0){

reviewBox.innerHTML = `
<h2 style="color:green;">
Excellent! No wrong answers.
</h2>
`;

return;

}

reviewBox.innerHTML =
"<h2 style='margin-bottom:20px;'>Wrong Answers Review</h2>";

wrongAnswers.forEach((item,index)=>{

reviewBox.innerHTML += `

<div class="review-item">

<strong>
Q${index+1}. ${item.question}
</strong>

<br><br>

<span class="wrong">
Your Answer: ${item.selected}
</span>

<br><br>

<span class="correct">
Correct Answer: ${item.correct}
</span>

</div>

`;

});

}

function restartQuiz(){

document.getElementById("resultSection").style.display = "none";
document.getElementById("examSection").style.display = "block";

timeLeft = 3600;

loadQuestions();
updateProgress();
startTimer();

}

function updateProgress(){

const answered =
document.querySelectorAll("input[type='radio']:checked").length;

const percent =
(answered/questions.length)*100;

document.getElementById("progressBar").style.width =
percent + "%";

}

let timeLeft = 5400;
let timerInterval;

function startTimer(){

clearInterval(timerInterval);

timerInterval = setInterval(()=>{

let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft % 60;

seconds = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("timer").innerText =
`${minutes}:${seconds}`;

if(timeLeft <= 0){

clearInterval(timerInterval);
submitQuiz();

}

timeLeft--;

},1000);

}

loadQuestions();
startTimer();

</script>
