<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e40af);

    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:20px;
    gap:10px;
}

.timer{
    background:#dc2626;
    color:white;
    padding:10px 16px;
    border-radius:10px;
    font-weight:bold;
}

.progress{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#2563eb;
    transition:0.3s;
}

.question-box{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.question{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
    color:#111827;
}

.option{
    display:block;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    margin-bottom:10px;
    background:white;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#dbeafe;
}

input[type="radio"]{
    margin-right:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    margin-top:20px;
}

button:hover{
    background:#1d4ed8;
}

.result-section{
    display:none;
    text-align:center;
}

.score{
    font-size:60px;
    color:#16a34a;
    font-weight:bold;
    margin:20px 0;
}

.correct{
    color:green;
    font-weight:bold;
}

.wrong{
    color:red;
    font-weight:bold;
}

.review{
    text-align:left;
    margin-top:25px;
}

.review-item{
    background:#f9fafb;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

@media(max-width:600px){

    .question{
        font-size:16px;
    }

    .score{
        font-size:40px;
    }

}

</style>
</head>

<div class="result-section" id="resultSection">

<div class="score" id="scoreText">0/70</div>

<div id="resultDetails"></div>

<button onclick="showReview()">View Wrong Answers</button>

<button onclick="restartQuiz()">Restart Test</button>

<div class="review" id="reviewBox"></div>

</div>

const form = document.getElementById("quizForm");

function loadQuestions(){

form.innerHTML = "";

questions.forEach((q,index)=>{

form.innerHTML += `

<div class="question-box">

<div class="question">
Q${index+1}. ${q.question}
</div>

${q.options.map((option,i)=>`

<label class="option">

<input type="radio"
name="q${index}"
value="${i}"
onchange="updateProgress()">

${option}

</label>

`).join("")}

</div>

`;

});

}

let wrongAnswers = [];

function submitQuiz(){

let score = 0;
wrongAnswers = [];

questions.forEach((q,index)=>{

const selected =
document.querySelector(`input[name="q${index}"]:checked`);

if(selected && parseInt(selected.value) === q.answer){

score++;

}else{

wrongAnswers.push({
question:q.question,
selected:selected ? q.options[selected.value] : "Not Answered",
correct:q.options[q.answer]
});

}

});

document.getElementById("examSection").style.display = "none";
document.getElementById("resultSection").style.display = "block";

document.getElementById("scoreText").innerText =
`${score}/${questions.length}`;

const percentage =
((score/questions.length)*100).toFixed(2);

document.getElementById("resultDetails").innerHTML = `

<h2>
Correct:
<span class="correct">${score}</span>
</h2>

<br>

<h2>
Wrong:
<span class="wrong">${questions.length-score}</span>
</h2>

<br>

<h2>
Percentage: ${percentage}%
</h2>

`;

clearInterval(timerInterval);

}

function showReview(){

const reviewBox =
document.getElementById("reviewBox");

if(wrongAnswers.length===0){

reviewBox.innerHTML = `
<h2 style="color:green;">
Excellent! No wrong answers.
</h2>
`;

return;

}

reviewBox.innerHTML =
"<h2 style='margin-bottom:20px;'>Wrong Answers Review</h2>";

wrongAnswers.forEach((item,index)=>{

reviewBox.innerHTML += `

<div class="review-item">

<strong>
Q${index+1}. ${item.question}
</strong>

<br><br>

<span class="wrong">
Your Answer: ${item.selected}
</span>

<br><br>

<span class="correct">
Correct Answer: ${item.correct}
</span>

</div>

`;

});

}

function restartQuiz(){

document.getElementById("resultSection").style.display = "none";
document.getElementById("examSection").style.display = "block";

timeLeft = 3600;

loadQuestions();
updateProgress();
startTimer();

}

function updateProgress(){

const answered =
document.querySelectorAll("input[type='radio']:checked").length;

const percent =
(answered/questions.length)*100;

document.getElementById("progressBar").style.width =
percent + "%";

}

let timeLeft = 6000;
let timerInterval;

function startTimer(){

clearInterval(timerInterval);

timerInterval = setInterval(()=>{

let minutes = Math.floor(timeLeft/60);
let seconds = timeLeft % 60;

seconds = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("timer").innerText =
`${minutes}:${seconds}`;

if(timeLeft <= 0){

clearInterval(timerInterval);
submitQuiz();

}

timeLeft--;

},1000);

}

loadQuestions();
startTimer();
